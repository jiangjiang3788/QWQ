<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OVO 启动诊断</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f5f5f7;color:#222}.wrap{max-width:760px;margin:auto;padding:24px}.card{background:white;border-radius:16px;padding:18px;margin:12px 0;box-shadow:0 4px 20px rgba(0,0,0,.06)}.ok{color:#16833b}.bad{color:#c62828}.wait{color:#7a6400}pre{white-space:pre-wrap;word-break:break-word;background:#f2f2f4;padding:12px;border-radius:10px;font-size:12px}button,a{display:inline-block;padding:10px 14px;border-radius:10px;border:0;background:#111;color:#fff;text-decoration:none;margin-right:8px}
</style>
</head>
<body><div class="wrap"><h1>OVO 启动诊断</h1><p>本页不依赖主程序。它会逐项检查本地脚本、IndexedDB 和必要浏览器能力。</p><div id="results"></div><div class="card"><a href="index.html">返回主程序</a><button onclick="location.reload()">重新检测</button></div></div>
<script>
(function(){
const results=document.getElementById('results');const rows=[];
function add(name,status,detail){rows.push({name,status,detail});render()}
function render(){results.innerHTML=rows.map(r=>`<div class="card"><b>${escapeHtml(r.name)}</b><div class="${r.status==='通过'?'ok':r.status==='失败'?'bad':'wait'}">${r.status}</div>${r.detail?`<pre>${escapeHtml(r.detail)}</pre>`:''}</div>`).join('')}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
window.addEventListener('error',e=>add('页面脚本异常','失败',e.error&&e.error.stack||e.message||'未知错误'));
add('页面协议','通过',location.protocol+'  '+location.href);
add('IndexedDB API',window.indexedDB?'通过':'失败',window.indexedDB?'浏览器提供 IndexedDB':'当前环境不支持 IndexedDB，主程序无法保存数据');
add('Promise / async',window.Promise?'通过':'失败','');
add('字体 API',document.fonts?'通过':'可选缺失','缺失时只会跳过自定义本地字体，不应阻止启动');
const scripts=[
 ['Dexie','vendor/dexie.js','Dexie'],['DOMPurify','vendor/purify.min.js','DOMPurify'],['ECharts','vendor/echarts.min.js','echarts'],['html2canvas','vendor/html2canvas.min.js','html2canvas'],['Mammoth','vendor/mammoth.browser.min.js','mammoth'],['JSZip','vendor/jszip.min.js','JSZip'],['Sortable','vendor/Sortable.min.js','Sortable'],['CryptoJS','vendor/crypto-js.min.js','CryptoJS']
];
function loadOne(i){if(i>=scripts.length){testDb();return}const [name,src,globalName]=scripts[i];const s=document.createElement('script');s.src=src;s.onload=()=>{add(name+' 本地脚本',window[globalName]?'通过':'失败',src+(window[globalName]?'':' 已加载但没有产生全局对象'));loadOne(i+1)};s.onerror=()=>{add(name+' 本地脚本','失败','无法加载 '+src+'。请确认解压后 vendor 文件夹与 index.html 在同一级目录。');loadOne(i+1)};document.head.appendChild(s)}
function testDb(){if(!window.indexedDB||!window.Dexie){add('IndexedDB 实际读写','失败','缺少 IndexedDB 或 Dexie');return}try{const db=new Dexie('ovo_diagnostic_'+Date.now());db.version(1).stores({t:'++id,value'});db.open().then(()=>db.table('t').add({value:'ok'})).then(()=>db.table('t').count()).then(count=>{add('IndexedDB 实际读写',count===1?'通过':'失败','写入后记录数：'+count);return db.delete()}).catch(e=>add('IndexedDB 实际读写','失败',e.stack||String(e)))}catch(e){add('IndexedDB 实际读写','失败',e.stack||String(e))}}
loadOne(0);
})();
</script></body></html>
